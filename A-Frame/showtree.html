<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>3D Model Viewer - GenTree (With Movement)</title>
    <!-- 引入 A-Frame 库 -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- 注意：如果要用 wasd 移动，通常不需要 orbit-controls，除非你做特殊混合 -->
  </head>
  <body>
    <!-- 定义场景 -->
    <a-scene background="color: #ECECEC">
      
      <!-- 
        资产管理系统：预加载模型 
      -->
      <a-assets>
        <a-asset-item id="treeModel" src="./GenTree-103_AE3D_03122023-F1.glb"></a-asset-item>
      </a-assets>

      <!-- 
        实体：显示 3D 模型 
        - position: 模型位置。如果模型很大，可能需要调整相机初始位置远离它
        - scale: 缩放比例
      -->
      <a-entity 
        gltf-model="#treeModel" 
        position="0 0 0" 
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

      <!-- 
        地面：作为参考，防止用户掉出世界底部 
      -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" opacity="0.5"></a-plane>

      <!-- 
        相机：启用移动和视角控制 
        - wasd-controls: 启用键盘 W/A/S/D 移动
        - look-controls: 启用鼠标拖拽改变视角方向
        - position: 初始相机位置。如果模型很大，建议把相机往后放，例如 "0 1.6 10"
        - height: 眼睛高度，默认 1.6 米
      -->
      <a-entity camera 
                look-controls 
                wasd-controls="acceleration: 100" 
                position="0 1.6 10">
      </a-entity>

    </a-scene>
  </body>
</html>
